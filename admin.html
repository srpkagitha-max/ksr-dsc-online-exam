<!doctype html><html lang="te"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KSR DSC L2 - Admin</title><link rel="stylesheet" href="style.css"><script src="firebase-config.js"></script></head><body>
<header><b>KSR DSC L2 Admin</b><span><a href="index.html">Student</a></span></header>
<main class="grid">
<section class="card" id="loginBox"><h2>Admin Login</h2><input id="pin" placeholder="Admin PIN" type="password"><button id="loginBtn">Login</button><p class="notice">Default PIN: <b>1234</b>. Later Firebase Auth add cheyyali.</p></section>
<section id="panel" class="card hidden"><h2>Institute</h2><input id="instituteCode" placeholder="Institute Code e.g. KSR"><input id="instituteName" placeholder="Institute Name"><button id="saveInstituteBtn">Save Institute</button><hr><h2>Create Exam</h2><input id="examTitle" placeholder="Exam Title"><div class="row"><label>Start <input id="startTime" type="datetime-local"></label><label>End <input id="endTime" type="datetime-local"></label></div><textarea id="bits" rows="12" placeholder="Paste 200+ bits here. Correct answer: ● ⚫ * or Answer: A"></textarea><button id="previewBtn">Preview Questions</button><div id="preview"></div><button id="saveExamBtn" class="ok">Save Exam to Firebase</button></section>
<section id="examsBox" class="card hidden"><h2>Existing Exams</h2><input id="filterInst" placeholder="Institute Code"><button id="loadExamsBtn">Load Exams</button><div id="examList"></div></section>
<section id="results" class="card hidden"><h2>Leaderboard / Marks List</h2><input id="leaderExamId" placeholder="Exam ID"><button id="loadLeaderBtn">Load Leaderboard</button><button id="printBtn" class="secondary">Print / PDF</button><div id="leaderboard"></div></section>
</main><script type="module" src="admin.js"></script></body></html>
