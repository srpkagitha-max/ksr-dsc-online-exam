<!doctype html><html lang="te"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KSR Admin Phase 1</title><link rel="stylesheet" href="style.css"></head><body><div class="top"><div class="row"><div><div class="brand">KSR DSC Enterprise V5.0</div><div class="sub">Phase 1 • Institute + Exam Foundation</div></div><div class="nav"><a href="index.html">Student</a><a href="question-bank.html">Question Bank</a><a href="#" id="logoutBtn">Logout</a></div></div></div><div class="wrap"><div id="message" class="hidden"></div><div class="grid"><div class="card"><h2>Create Institute</h2><label>Institute Code</label><input id="instCode" placeholder="KSR"><label>Institute Name</label><input id="instName" placeholder="KSR Institute"><button class="btn green" id="saveInst">Save Institute</button></div><div class="card"><h2>Create Institute Admin</h2><label>Admin Name</label><input id="admName"><label>Email</label><input id="admEmail" type="email"><label>Password</label><input id="admPass" type="password"><label>Institute Code</label><input id="admInst" placeholder="KSR"><button class="btn" id="saveAdmin">Create Admin</button><p class="small">Note: Firebase Auth lo new admin create avutadu.</p></div><div class="card"><h2>Create Exam Foundation</h2><label>Institute Code</label><input id="examInst" placeholder="KSR"><label>Exam Title</label><input id="examTitle" placeholder="DSC Grand Test - 1"><label>Start Time</label><input id="start" type="datetime-local"><label>End Time</label><input id="end" type="datetime-local"><label>Duration Minutes</label><input id="duration" type="number" value="150"><label>Status</label><select id="status"><option value="draft">Draft</option><option value="active">Active</option><option value="closed">Closed</option></select><button class="btn green" id="saveExam">Save Exam</button></div><div class="card"><h2>Dashboard</h2><div class="grid"><div><div class="kpi" id="instCount">0</div><div class="small">Institutes</div></div><div><div class="kpi" id="examCount">0</div><div class="small">Loaded Exams</div></div></div><label>Load Exams by Institute</label><input id="loadInst" placeholder="KSR"><button class="btn" id="loadExams">Load Exams</button></div></div><div class="card" style="margin-top:18px"><h2>Institutes</h2><div id="institutes"></div></div><div class="card" style="margin-top:18px"><h2>Exams</h2><div id="exams"></div></div></div><script type="module">import{requireLogin,logout,toast,createInstitute,createAdmin,createExam,listInstitutes,listExams,archiveExam,restoreExam,permanentDeleteExam,archiveInstitute,restoreInstitute,permanentDeleteInstitute}from'./app.js';let user=await requireLogin();logoutBtn.onclick=logout;async function refresh(){let ins=await listInstitutes();instCount.textContent=ins.length;institutes.innerHTML=ins.map(i=>`<div class="msg"><div class="qhead"><div><b>${i.code}</b> - ${i.name}<br><span class="small">${i.active?'Active':'Archived'}</span></div><div class="miniActions">${i.active?`<button class="orange instArchive" data-code="${i.code}">Archive</button>`:`<button class="green instRestore" data-code="${i.code}">Restore</button><button class="red instDelete" data-code="${i.code}">Permanent Delete</button>`}</div></div></div>`).join('')||'<div class="msg warn">No institutes</div>';bindInstituteActions()}refresh();saveInst.onclick=async()=>{try{await createInstitute(instCode.value,instName.value);toast('Institute saved','ok');refresh()}catch(e){toast(e.message,'bad')}};saveAdmin.onclick=async()=>{try{await createAdmin(admEmail.value,admPass.value,admName.value,admInst.value);toast('Admin created','ok')}catch(e){toast(e.message,'bad')}};saveExam.onclick=async()=>{try{let id=await createExam(examInst.value,{title:examTitle.value,startTime:start.value,endTime:end.value,duration:duration.value,status:status.value});toast('Exam saved: '+id,'ok')}catch(e){toast(e.message,'bad')}};loadExams.onclick=async()=>{try{let ex=await listExams(loadInst.value);examCount.textContent=ex.length;exams.innerHTML=ex.map(e=>`<div class="msg"><div class="qhead"><div><b>${e.title}</b><br><span class="pill">${e.status}</span><br><span class="small">ID: ${e.id}<br>Start: ${e.startTime||'-'}<br>End: ${e.endTime||'-'}</span></div><div class="miniActions">${e.status==='archived'?`<button class="green examRestore" data-id="${e.id}">Restore</button><button class="red examDelete" data-id="${e.id}">Permanent Delete</button>`:`<button class="orange examArchive" data-id="${e.id}">Archive</button>`}</div></div></div>`).join('')||'<div class="msg warn">No exams</div>';bindExamActions()}catch(e){toast(e.message,'bad')}}
function bindInstituteActions(){document.querySelectorAll('.instArchive').forEach(b=>b.onclick=async()=>{if(!confirm('Institute ni Archive cheyyala?'))return;try{await archiveInstitute(b.dataset.code);toast('Institute archived','ok');refresh()}catch(e){toast(e.message,'bad')}});document.querySelectorAll('.instRestore').forEach(b=>b.onclick=async()=>{try{await restoreInstitute(b.dataset.code);toast('Institute restored','ok');refresh()}catch(e){toast(e.message,'bad')}});document.querySelectorAll('.instDelete').forEach(b=>b.onclick=async()=>{const code=b.dataset.code;if(prompt('Permanent delete kosam institute code type cheyyandi')!==code)return;try{await permanentDeleteInstitute(code);toast('Institute permanently deleted','ok');refresh()}catch(e){toast(e.message,'bad')}})}
function bindExamActions(){document.querySelectorAll('.examArchive').forEach(b=>b.onclick=async()=>{if(!confirm('Exam ni Archive cheyyala?'))return;try{await archiveExam(b.dataset.id);toast('Exam archived','ok');loadExams.click()}catch(e){toast(e.message,'bad')}});document.querySelectorAll('.examRestore').forEach(b=>b.onclick=async()=>{try{await restoreExam(b.dataset.id);toast('Exam restored','ok');loadExams.click()}catch(e){toast(e.message,'bad')}});document.querySelectorAll('.examDelete').forEach(b=>b.onclick=async()=>{if(prompt('Permanent delete kosam DELETE type cheyyandi')!=='DELETE')return;try{await permanentDeleteExam(b.dataset.id);toast('Exam permanently deleted','ok');loadExams.click()}catch(e){toast(e.message,'bad')}})}
</script></body></html>
