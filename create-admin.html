<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Create Admin</title><link rel="stylesheet" href="style.css"></head><body><div class="hero"><h1>KSR Create Admin</h1><p>First admin account</p><div class="nav"><a class="btn gray" href="login.html">Login</a></div></div><div class="wrap"><div class="card"><h2>Create First Admin</h2><div id="msg"></div><label>Email</label><input id="email" placeholder="admin@gmail.com"><label>Password</label><input id="pass" type="password" placeholder="minimum 6 chars"><label>Name</label><input id="name" value="KSR Admin"><button class="green" id="create">Create Admin</button><p class="msg warn">ఒక్కసారి admin create అయిన తర్వాత login.html లో login చేయండి.</p></div></div><script type="module">import{auth,db,createUserWithEmailAndPassword,doc,setDoc,serverTimestamp,$,show}from'./app.js';$('create').onclick=async()=>{try{const u=await createUserWithEmailAndPassword(auth,$('email').value.trim(),$('pass').value);await setDoc(doc(db,'admins',u.user.uid),{email:$('email').value.trim(),name:$('name').value||'KSR Admin',role:'superAdmin',createdAt:serverTimestamp()});show('Admin created successfully ✅');}catch(e){show(e.message,'err')}};</script></body></html>
