<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KSR Admin</title><link rel="stylesheet" href="style.css"></head><body><div class="hero"><h1>KSR DSC Enterprise Admin</h1><p>Phase 2 • Question Engine</p><div class="nav"><a class="btn gray" href="index.html">Student</a><a class="btn orange" href="questions.html">Question Editor</a><button class="gray" id="logout">Logout</button></div></div><div class="wrap"><div id="msg"></div><div class="card"><h2>Dashboard</h2><div class="grid"><div class="stat"><b id="adminEmail">-</b><p>Logged in admin</p></div><div class="stat"><b id="instCount">0</b><p>Institutes</p></div><div class="stat"><b id="examCount">0</b><p>Exams</p></div></div></div><div class="card"><h2>Create Institute</h2><label>Institute Code</label><input id="icode" value="KSR"><label>Institute Name</label><input id="iname" value="KSR Institute"><label>Contact optional</label><input id="contact"><button id="saveInst">Save Institute</button></div><div class="card"><h2>Create Exam Foundation</h2><label>Institute Code</label><input id="ecode" value="KSR"><label>Exam Title</label><input id="etitle" value="DSC Grand Test - 1"><label>Start Date & Time</label><input type="datetime-local" id="start"><label>End Date & Time</label><input type="datetime-local" id="end"><label>Status</label><select id="status"><option value="draft">Draft</option><option value="active">Active</option><option value="closed">Closed</option></select><button class="green" id="saveExam">Save Exam</button><p class="msg warn">Exam save ayyaka Question Editor lo questions add cheyyandi.</p></div><div class="card"><h2>Institutes</h2><div id="institutes"></div></div><div class="card"><h2>Exams</h2><div id="exams"></div></div></div><script type="module">import{auth,db,onAuthStateChanged,signOut,collection,getDocs,addDoc,serverTimestamp,$,show,esc}from'./app.js';let user=null;onAuthStateChanged(auth,u=>{if(!u) location.href='login.html'; else{user=u;$('adminEmail').textContent=u.email;load();}});$('logout').onclick=()=>signOut(auth);$('saveInst').onclick=async()=>{try{await addDoc(collection(db,'institutes'),{code:$('icode').value.trim().toUpperCase(),name:$('iname').value.trim(),contact:$('contact').value.trim(),createdBy:user.email,createdAt:serverTimestamp()});show('Institute saved ✅');load();}catch(e){show(e.message,'err')}};$('saveExam').onclick=async()=>{try{await addDoc(collection(db,'exams'),{instituteCode:$('ecode').value.trim().toUpperCase(),title:$('etitle').value.trim(),start:$('start').value,end:$('end').value,status:$('status').value,questionCount:0,createdBy:user.email,createdAt:serverTimestamp()});show('Exam foundation saved ✅');load();}catch(e){show(e.message,'err')}};async function load(){let is=await getDocs(collection(db,'institutes'));$('instCount').textContent=is.size;$('institutes').innerHTML='';is.forEach(d=>{let x=d.data();$('institutes').innerHTML+=`<div class=qcard><b>${esc(x.name)}</b><p>Code: ${esc(x.code)}</p></div>`});let es=await getDocs(collection(db,'exams'));$('examCount').textContent=es.size;$('exams').innerHTML='';es.forEach(d=>{let x=d.data();$('exams').innerHTML+=`<div class=qcard><b>${esc(x.title)}</b><p>Institute: ${esc(x.instituteCode)} • Status: <span class=pill>${esc(x.status)}</span></p><p class=small>ID: ${d.id}</p><a class="btn orange" href="questions.html?exam=${d.id}">Add/Edit Questions</a></div>`});}</script></body></html>
