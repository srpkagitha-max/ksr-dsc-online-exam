<!doctype html><html lang="te"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KSR Daily Test Admin</title><link rel="stylesheet" href="style.css"></head><body>
<div class="hero"><h1>KSR Daily Test Admin</h1><p>Create • Preview • Generate Codes • Results</p><div class="nav"><a class="btn gray" href="index.html">Student Login</a><button class="gray" id="logout">Logout</button></div></div>
<div class="wrap"><div id="msg"></div>
<div class="card"><h2>Create Daily Exam</h2><div class="grid two">
<div><label>Institute Name</label><input id="instituteName" placeholder="KSR Institute"></div>
<div><label>Exam ID</label><input id="examId" placeholder="TEST-101"></div>
<div><label>Exam Name (optional)</label><input id="examTitle" placeholder="Daily Grand Test"></div>
<div><label>Number of Students / Codes</label><input id="codeCount" type="number" min="1" max="1000" value="50"></div>
<div><label>Start Time</label><input id="startTime" type="datetime-local"></div>
<div><label>End Time</label><input id="endTime" type="datetime-local"></div>
<div><label>Seconds for Each Question</label><input id="secondsPerQuestion" type="number" min="5" max="600" value="60"></div>
<div><label>Status</label><select id="status"><option value="active">Active</option><option value="draft">Draft</option><option value="closed">Closed</option></select></div>
</div>
<label>Paste Bits</label><textarea id="rawBits" class="bits-box" placeholder="1. Question text\nA) Option 1\nB) Option 2 ●\nC) Option 3\nD) Option 4"></textarea>
<div class="action-row"><button id="parseBtn">Parse Questions</button><button class="gray" id="addQuestionBtn">+ Add Question</button><button class="orange" id="previewBtn">Student Exam Preview</button><button class="green" id="saveGenerateBtn">Save + Generate Codes</button></div>
<div id="health" class="health-box"></div><div id="questionEditor"></div></div>

<div class="card" id="previewCard" hidden><h2>Student Exam Preview</h2><p class="small">ఇది preview మాత్రమే. Result save కాదు.</p><div class="preview-exam"><div class="preview-head"><b id="previewTitle">Exam Preview</b><span id="previewTimer">00:00</span></div><div id="previewContent"></div><div id="previewNav" class="palette"></div></div></div>

<div class="card"><h2>Generated Codes</h2><div class="action-row"><button id="copyCodes" class="gray">Copy All Codes</button><button id="printCodes" class="orange">Download / Print PDF</button></div><div id="codesBox"><p class="small">Exam save చేసిన తర్వాత codes ఇక్కడ కనిపిస్తాయి.</p></div></div>

<div class="card"><h2>Results & Ranks</h2><div class="grid two"><div><label>Exam ID</label><input id="resultExamId" placeholder="TEST-101"></div><div class="result-buttons"><button id="loadResults">Load Results</button><button id="printResults" class="orange">Download / Print PDF</button></div></div><div id="resultsBox"></div></div>

<div class="card"><h2>Saved Exams</h2><button id="refreshExams" class="gray">Refresh</button><div id="savedExams"></div></div>
</div><script type="module" src="admin-daily.js"></script></body></html>
