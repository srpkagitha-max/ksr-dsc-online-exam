<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KSR Admin</title><link rel="stylesheet" href="style.css"></head><body><div class="hero"><h1>KSR DSC Enterprise Admin</h1><p>Phase 3.2 • Manual Time + DSC Exam Engine</p><div class="nav"><a class="btn gray" href="index.html">Student</a><a class="btn orange" href="questions.html">Question Editor</a><button class="gray" id="logout">Logout</button></div></div><div class="wrap"><div id="msg"></div><div class="card"><h2>Dashboard</h2><div class="grid"><div class="stat"><b id="adminEmail">-</b><p>Logged in admin</p></div><div class="stat"><b id="instCount">0</b><p>Institutes</p></div><div class="stat"><b id="examCount">0</b><p>Exams</p></div></div></div><div class="card"><h2>Create Institute</h2><label>Institute Code</label><input id="icode" value="KSR"><label>Institute Name</label><input id="iname" value="KSR Institute"><label>Contact optional</label><input id="contact"><button id="saveInst">Save Institute</button></div><div class="card"><h2>Create Exam</h2><label>Institute Code</label><input id="ecode" value="KSR"><label>Exam Title</label><input id="etitle" value="DSC Grand Test - 1"><label>Start Date & Time</label><input type="datetime-local" id="start"><label>End Date & Time</label><input type="datetime-local" id="end"><div class="grid two"><div><label>Total Exam Time (Minutes)</label><input type="number" id="totalMinutes" value="30" min="1"></div><div><label>Allow Previous</label><select id="allowPrevious"><option value="yes">Yes</option><option value="no">No</option></select></div><div><label>Shuffle Questions within Subject</label><select id="shuffleQuestions"><option value="yes">Yes</option><option value="no">No</option></select></div><div><label>Shuffle Options</label><select id="shuffleOptions"><option value="no">No</option><option value="yes">Yes</option></select></div><div><label>Status</label><select id="status"><option value="draft">Draft</option><option value="active">Active</option><option value="closed">Closed</option></select></div></div><p class="msg warn">Exam time automatic ga calculate avvadu. Admin ikkada manual ga total minutes set cheyyali.</p><button class="green" id="saveExam">Save Exam</button></div><div class="card"><h2>Institutes</h2><div id="institutes"></div></div><div class="card"><h2>Exams</h2><div id="exams"></div></div></div><script type="module">import{auth,db,onAuthStateChanged,signOut,collection,getDocs,addDoc,serverTimestamp,$,show,esc}from'./app.js';let user=null;onAuthStateChanged(auth,u=>{if(!u)location.href='login.html';else{user=u;$('adminEmail').textContent=u.email;load();}});$('logout').onclick=()=>signOut(auth);$('saveInst').onclick=async()=>{try{await addDoc(collection(db,'institutes'),{code:$('icode').value.trim().toUpperCase(),name:$('iname').value.trim(),contact:$('contact').value.trim(),createdBy:user.email,createdAt:serverTimestamp()});show('Institute saved ✅');load();}catch(e){show(e.message,'err')}};$('saveExam').onclick=async()=>{try{const totalMinutes=Math.max(1,Number($('totalMinutes').value||30));await addDoc(collection(db,'exams'),{instituteCode:$('ecode').value.trim().toUpperCase(),title:$('etitle').value.trim(),start:$('start').value,end:$('end').value,status:$('status').value,questionCount:0,timeMode:'total',totalMinutes,allowPrevious:$('allowPrevious').value==='yes',shuffleQuestions:$('shuffleQuestions').value==='yes',shuffleOptions:$('shuffleOptions').value==='yes',createdBy:user.email,createdAt:serverTimestamp()});show('Exam saved ✅');load();}catch(e){show(e.message,'err')}};async function load(){let is=await getDocs(collection(db,'institutes'));$('instCount').textContent=is.size;$('institutes').innerHTML='';is.forEach(d=>{let x=d.data();$('institutes').innerHTML+=`<div class=qcard><b>${esc(x.name)}</b><p>Code: ${esc(x.code)}</p></div>`});let es=await getDocs(collection(db,'exams'));$('examCount').textContent=es.size;$('exams').innerHTML='';es.forEach(d=>{let x=d.data();$('exams').innerHTML+=`<div class=qcard><b>${esc(x.title)}</b><p>Institute: ${esc(x.instituteCode)} • Status: <span class=pill>${esc(x.status)}</span></p><p>Total Time: ${x.totalMinutes||30} minutes</p><p class=small>ID: ${d.id}</p><div class="examActions"><a class="btn orange" href="questions.html?exam=${d.id}">Add/Edit Questions</a><a class="btn green" href="exam.html?id=${d.id}&name=Demo%20Student&phone=9999999999">Student Preview</a></div></div>`});}</script></body></html>
