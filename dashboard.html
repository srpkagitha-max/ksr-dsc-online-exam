<!doctype html><html lang="te"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin Dashboard</title><link rel="stylesheet" href="style.css"><script src="firebase-config.js"></script></head><body>
<header class="top"><h1>KSR DSC Enterprise Admin</h1><p>Phase 1 • Institute + Exam Foundation</p><div class="nav"><a href="index.html">Student</a><a href="login.html" id="logout">Logout</a></div></header>
<main class="wrap"><div id="msg" style="display:none"></div><section class="card"><h2>Dashboard</h2><div class="grid"><div class="mini"><h3 id="adminEmail">Loading...</h3><p class="muted">Logged in admin</p></div><div class="mini"><h3 id="instCount">0</h3><p class="muted">Institutes</p></div><div class="mini"><h3 id="examCount">0</h3><p class="muted">Exams</p></div></div></section>
<section class="card"><h2>Create Institute</h2><label>Institute Code</label><input id="icode" placeholder="KSR"><label>Institute Name</label><input id="iname" placeholder="KSR Institute"><label>Contact optional</label><input id="icontact"><button class="btn" id="saveInst">Save Institute</button></section>
<section class="card"><h2>Create Exam Foundation</h2><div class="row"><div><label>Institute Code</label><input id="eicode" placeholder="KSR"></div><div><label>Exam Title</label><input id="etitle" placeholder="DSC Grand Test - 1"></div></div><div class="row"><div><label>Start Date & Time</label><input id="start" type="datetime-local"></div><div><label>End Date & Time</label><input id="end" type="datetime-local"></div></div><label>Status</label><select id="status"><option value="draft">Draft</option><option value="active">Active</option><option value="closed">Closed</option></select><button class="btn green" id="saveExam">Save Exam</button><div class="hint">Phase 2 లో 200+ questions bulk parser/editor add అవుతుంది.</div></section>
<section class="card"><h2>Institutes</h2><div id="institutes" class="grid"></div></section><section class="card"><h2>Exams</h2><div id="exams" class="grid"></div></section></main>
<script type="module">
import {ready,auth,db,F,el,show,cleanCode,requireLogin} from './app.js';
let user=null; async function boot(){if(!ready){show('msg','Firebase config missing. setup.html open cheyyandi.','err');return} user=await requireLogin(); if(!user){location.href='login.html';return} el('adminEmail').textContent=user.email; await loadAll()}
async function loadAll(){const is=await F.getDocs(F.query(F.collection(db,'institutes'),F.orderBy('createdAt','desc'))); const es=await F.getDocs(F.query(F.collection(db,'exams'),F.orderBy('createdAt','desc'))); el('instCount').textContent=is.size; el('examCount').textContent=es.size; el('institutes').innerHTML=''; is.forEach(d=>{const x=d.data(); const div=document.createElement('div'); div.className='mini'; div.innerHTML=`<h3>${x.name}</h3><p><b>Code:</b> ${x.code}</p><p class="muted">${x.contact||''}</p>`; el('institutes').appendChild(div)}); el('exams').innerHTML=''; es.forEach(d=>{const x=d.data(); const div=document.createElement('div'); div.className='mini'; div.innerHTML=`<h3>${x.title}</h3><p><b>Institute:</b> ${x.instituteCode}</p><p><b>Status:</b> <span class="pill">${x.status}</span></p><p class="muted">ID: ${d.id}</p>`; el('exams').appendChild(div)})}
el('saveInst').onclick=async()=>{try{const code=cleanCode(el('icode').value); const name=el('iname').value.trim(); if(!code||!name){show('msg','Institute code/name required.','err');return} await F.setDoc(F.doc(db,'institutes',code),{code,name,contact:el('icontact').value.trim(),createdAt:F.serverTimestamp(),createdBy:user.email}); show('msg','Institute saved ✅','ok'); await loadAll()}catch(e){show('msg',e.message,'err')}};
el('saveExam').onclick=async()=>{try{const instituteCode=cleanCode(el('eicode').value); const title=el('etitle').value.trim(); if(!instituteCode||!title){show('msg','Institute code/exam title required.','err');return} const inst=await F.getDoc(F.doc(db,'institutes',instituteCode)); await F.addDoc(F.collection(db,'exams'),{instituteCode,instituteName:inst.exists()?inst.data().name:instituteCode,title,startTime:el('start').value,endTime:el('end').value,status:el('status').value,questionCount:0,createdAt:F.serverTimestamp(),createdBy:user.email}); show('msg','Exam foundation saved ✅','ok'); await loadAll()}catch(e){show('msg',e.message,'err')}};
el('logout').onclick=async(e)=>{e.preventDefault(); await F.signOut(auth); location.href='login.html'}; boot();
</script></body></html>
