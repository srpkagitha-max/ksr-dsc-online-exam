<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Exam</title><link rel="stylesheet" href="style.css"></head><body><div class="hero"><h1>KSR DSC Exam</h1><p id="meta">Loading...</p></div><div class="wrap"><div id="msg"></div><div class="examShell"><div class="examTop"><b id="subTitle">Subject</b><span class="timer" id="clock">00:00</span></div><div id="qbox"></div><button id="prev" class="gray">Previous</button><button id="next">Next</button><button id="submit" class="green">Submit Exam</button></div></div><script type="module">import{db,doc,getDoc,setDoc,serverTimestamp,$,show,esc}from'./app.js';import{studentShuffle}from'./parser.js';let qs=[],idx=0,ans={};const p=new URL(location.href).searchParams;const examId=p.get('id'),name=p.get('name')||'Student',phone=p.get('phone')||'';async function init(){const ex=await getDoc(doc(db,'exams',examId));const qd=await getDoc(doc(db,'examQuestions',examId));if(!ex.exists()||!qd.exists())return show('Exam/questions not found','err');$('meta').textContent=ex.data().title+' • '+name;qs=studentShuffle(qd.data().questions||[], phone||name||Date.now());render();}function render(){let q=qs[idx];$('subTitle').textContent=q.subject||'General';$('qbox').innerHTML=`<h2>Q${idx+1}. ${esc(q.question).replace(/\n/g,'<br>')}</h2>`+q.options.map(o=>`<label class=qcard><input type=radio name=a value="${o.key}" ${ans[idx]===o.key?'checked':''}> ${o.key}) ${esc(o.text)}</label>`).join('')+`<p class=small>${idx+1}/${qs.length}</p>`;document.querySelectorAll('input[name=a]').forEach(r=>r.onchange=()=>ans[idx]=r.value)}$('prev').onclick=()=>{if(idx>0){idx--;render();}};$('next').onclick=()=>{if(idx<qs.length-1){idx++;render();}};$('submit').onclick=async()=>{let score=0;qs.forEach((q,i)=>{if(ans[i]===q.answer)score+=Number(q.marks||1)});await setDoc(doc(db,'results',examId+'_'+phone),{examId,name,phone,answers:ans,score,total:qs.length,submittedAt:serverTimestamp()});location.href='result.html?score='+score+'&total='+qs.length+'&name='+encodeURIComponent(name)};init();</script></body></html>
