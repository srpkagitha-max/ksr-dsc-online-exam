<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KSR DSC Exam</title><link rel="stylesheet" href="style.css">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#064a86">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="KSR EXAMOS">
<link rel="apple-touch-icon" href="./icon-192.png">
</head>
<body class="examBody">
<div id="msg"></div>
<div class="dscExam">
  <header class="dscHeader compactExamHeader">
    <b id="instName">KSR Institute</b>
    <div class="cornerTimer" aria-label="Time left">⏱ <b id="clock">00:00:00</b></div>
    <span id="examTitle" hidden></span>
    <span id="studentName" hidden></span><span id="hallTicket" hidden></span>
  </header>
  <div class="subjectTabs" id="subjectTabs" hidden></div>
  <main class="dscMain">
    <section class="questionPanel">
      <div class="qHead"><b id="qNo">Question 1</b><span class="qTotal"><b id="progressText">1 / 1</b></span><span id="qSubject" class="pill">Subject</span></div><div class="examProgress"><span id="progressBar"></span></div><span id="totalQuestions" hidden>0</span>
      <div id="qbox" class="questionText"></div>
      <div id="options" class="optionsGrid"></div>
      <div class="controls examControlLayout">
        <div class="controlPrimaryRow">
          <button id="review" class="purple">Mark for Review</button>
          <button id="next" class="green">Save & Next →</button>
        </div>
        <div class="controlSecondaryRow">
          <button id="prev" class="gray">← Previous</button>
          <button id="clear" class="orange">Clear Response</button>
          <button id="submit" class="danger">Submit Test</button>
        </div>
      </div>
    </section>
    <aside class="palettePanel">
      <h3>Question Palette</h3>
      <div class="legend"><span><i class="dot ans"></i>Answered</span><span><i class="dot not"></i>Not Answered</span><span><i class="dot rev"></i>Review</span><span><i class="dot cur"></i>Current</span></div>
      <div id="palette" class="palette"></div>
      <div class="summary"><p>Answered: <b id="answeredCount">0</b></p><p>Review: <b id="reviewCount">0</b></p><p>Not Answered: <b id="notCount">0</b></p></div>
      <button id="fullscreen" class="blueBtn">Enter Full Screen</button>
    </aside>
  </main>
</div>
<div id="submitModal" class="modalOverlay" hidden><div class="modalCard"><h2 id="modalTitle">Confirm Submission</h2><p id="modalText"></p><div class="modalActions"><button id="continueExam" class="blueBtn">Continue Exam</button><button id="confirmSubmit" class="danger">Yes, Submit Exam</button></div></div></div>
<div id="timeupModal" class="modalOverlay" hidden><div class="modalCard"><h2>సమయం ముగిసింది</h2><p>మీ సమాధానాలు సేవ్ చేసి పరీక్ష ఆటోమేటిక్‌గా Submit అవుతోంది.</p></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script type="module">
import{db,doc,getDoc,setDoc,serverTimestamp,$,show,esc}from'./app.js';
import{studentShuffle}from'./parser.js';
let qs=[],idx=0,ans={},review={},spent={},qStart=Date.now(),exam={},accessData=null,timerInt=null,remaining=0,submitting=false,saveDebounce=null;
const SESSION_PREFIX='ksrExamSession:';
const p=new URL(location.href).searchParams;const examId=p.get('id'),accessId=p.get('access')||'',studentCode=(p.get('studentCode')||'').trim().toUpperCase();let name='',phone='',hall='';
function fmt(sec){sec=Math.max(0,Math.floor(sec));let h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}
function fmtMini(sec){sec=Math.max(0,Math.floor(sec));let m=Math.floor(sec/60),s=sec%60;return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}
async function init(){try{if(!accessId||!studentCode)return show('Secure student access missing. Student login nundi open cheyyandi.','err');const accessDoc=await getDoc(doc(db,'studentAccess',accessId));if(!accessDoc.exists())return show('Student access record not found','err');accessData=accessDoc.data();if((accessData.code||'').toUpperCase()!==studentCode||accessData.examId!==examId)return show('Invalid Student Code / Exam access','err');if(accessData.status==='completed')return show('Ee student code tho exam already completed.','err');name=accessData.studentName||'Student';phone=accessData.mobile||accessData.hallTicket||accessId;hall=accessData.hallTicket||phone;const ex=await getDoc(doc(db,'exams',examId));const qd=await getDoc(doc(db,'examQuestions',examId));if(!ex.exists()||!qd.exists())return show('Exam/questions not found','err');exam=ex.data();await setDoc(doc(db,'studentAccess',accessId),{...accessData,status:'inProgress',startedAt:accessData.startedAt||serverTimestamp()},{merge:true});let raw=qd.data().questions||[];qs=(exam.shuffleQuestions===false)?raw:studentShuffle(raw, phone||name||Date.now());if(exam.shuffleOptions) qs=qs.map(q=>shuffleQuestionOptions(q, phone+q.id));$('instName').textContent=exam.instituteName||exam.instituteCode||'KSR';$('examTitle').textContent=exam.title||'DSC Grand Test';$('studentName').textContent=name;$('hallTicket').textContent='Hall Ticket: '+hall;remaining=Math.max(1,Number(exam.secondsPerQuestion||0)*raw.length||Number(exam.totalMinutes||30)*60);restoreSession();renderSubjects();render();startTimers();}catch(e){show(e.message,'err')}}
function saveTime(){let now=Date.now();spent[idx]=(spent[idx]||0)+Math.max(0,Math.round((now-qStart)/1000));qStart=now;scheduleSessionSave();}
function sessionKey(){return SESSION_PREFIX+examId+':'+phone;}
function scheduleSessionSave(){clearTimeout(saveDebounce);saveDebounce=setTimeout(saveSession,120);}
function saveSession(){try{localStorage.setItem(sessionKey(),JSON.stringify({ans,review,spent,idx,remaining,savedAt:Date.now()}));}catch(e){}}
function restoreSession(){try{const raw=localStorage.getItem(sessionKey());if(!raw)return;const x=JSON.parse(raw);if(x&&typeof x==='object'){ans=x.ans||{};review=x.review||{};spent=x.spent||{};idx=Math.min(Math.max(0,Number(x.idx||0)),Math.max(0,qs.length-1));if(Number.isFinite(Number(x.remaining))&&Number(x.remaining)>0)remaining=Math.min(remaining,Number(x.remaining));show('Previous exam session restored ✅','warn');}}catch(e){}}
function startTimers(){clearInterval(timerInt);$('clock').textContent=fmt(remaining);timerInt=setInterval(()=>{remaining--; $('clock').textContent=fmt(remaining); if(remaining%5===0) saveSession(); if(remaining<=300) $('clock').classList.add('dangerText'); if(remaining<=0){clearInterval(timerInt);$('timeupModal').hidden=false;setTimeout(()=>submitExam(true),900);}},1000);}
function renderSubjects(){let subs=[...new Set(qs.map(q=>q.subject||'General'))];$('subjectTabs').innerHTML=subs.map(s=>`<button class="subTab" data-s="${esc(s)}">${esc(s)} (${qs.filter(q=>(q.subject||'General')===s).length})</button>`).join('');document.querySelectorAll('.subTab').forEach(b=>b.onclick=()=>{let i=qs.findIndex(q=>(q.subject||'General')===b.dataset.s); if(i>=0){saveTime();idx=i;render();}})}
function render(){let q=qs[idx];qStart=Date.now();$('qNo').textContent=`Question ${idx+1}`;$('totalQuestions').textContent=qs.length;$('progressText').textContent=`${idx+1} / ${qs.length}`;$('progressBar').style.width=`${Math.round(((idx+1)/Math.max(1,qs.length))*100)}%`;$('qSubject').textContent=q.subject||'General';$('qbox').innerHTML=formatQuestion(q.question||'');$('options').innerHTML=(q.options||[]).map(o=>`<label class="optionCard ${ans[idx]===o.key?'selected':''}"><input type="radio" name="a" value="${o.key}" ${ans[idx]===o.key?'checked':''}><b>${o.key}</b><span>${esc(o.text||'')}</span></label>`).join('');document.querySelectorAll('input[name=a]').forEach(r=>r.onchange=()=>{ans[idx]=r.value;scheduleSessionSave();renderPaletteOnly();document.querySelectorAll('.optionCard').forEach(c=>c.classList.remove('selected'));r.closest('.optionCard').classList.add('selected')});$('prev').disabled=idx===0 || exam.allowPrevious===false;renderPaletteOnly();}
function formatQuestion(text){
  const t=String(text||'').trim();
  let safe=esc(t);
  safe=safe.replace(/\s+(?=(?:I{1,4}|i{1,4})[.:]\s)/g,'\n');
  safe=safe.replace(/\s+(?=ప్రకటన\s*\d+\s*[:.])/g,'\n');
  safe=safe.replace(/\s+(?=జాబితా\s*-?\s*(?:1|2|I|II)\s*:)/gi,'\n');
  safe=safe.replace(/,\s*(?=(?:A|B|C|D|a|b|c|d|i|ii|iii|iv|1|2|3|4)[.)]\s)/g,'\n');
  safe=safe.replace(/\n/g,'<br>');
  safe=safe.replace(/((?:I{1,4}|i{1,4})[.:])/g,'<b class="stmtTitle">$1</b>');
  safe=safe.replace(/(ప్రకటన\s*\d+\s*[:.])/g,'<b class="stmtTitle">$1</b>');
  return safe;
}
function formatMatching(text){
  const parts=text.split(/జాబితా\s*-?\s*(?:2|II)\s*:/i);
  let left=(parts[0]||'').replace(/జాబితా\s*-?\s*(?:1|I)\s*:/i,'').trim();
  let right=(parts[1]||'').trim();
  const splitItems=(src,pattern)=>{
    let arr=src.split(pattern).map(x=>x.trim()).filter(Boolean);
    return arr;
  };
  const leftItems=splitItems(left,/(?=\b(?:A|B|C|D|i|ii|iii|iv|1|2|3|4)[.)]\s*)/i);
  const rightItems=splitItems(right,/(?=\b(?:a|b|c|d|1|2|3|4)[.)]\s*)/i);
  const rows=Math.max(leftItems.length,rightItems.length,1);
  let html='<div class="matchingBox"><div class="matchHead">Column - I</div><div class="matchHead">Column - II</div>';
  for(let i=0;i<rows;i++) html+=`<div class="matchCell">${esc(leftItems[i]||'')}</div><div class="matchCell">${esc(rightItems[i]||'')}</div>`;
  html+='</div>';
  return html;
}
function renderPaletteOnly(){$('palette').innerHTML=qs.map((q,i)=>{let cls=i===idx?'cur':review[i]?'rev':ans[i]?'ans':'not';return `<button class="pbtn ${cls}" data-i="${i}">${i+1}</button>`}).join('');document.querySelectorAll('.pbtn').forEach(b=>b.onclick=()=>{saveTime();idx=Number(b.dataset.i);render();document.querySelector('.questionPanel')?.scrollIntoView({behavior:'smooth',block:'start'});});$('answeredCount').textContent=Object.keys(ans).length;$('reviewCount').textContent=Object.keys(review).length;$('notCount').textContent=qs.length-Object.keys(ans).length;}
$('prev').onclick=()=>{if(idx>0 && exam.allowPrevious!==false){saveTime();idx--;render();}};$('next').onclick=()=>{if(idx<qs.length-1){saveTime();idx++;render();}else renderPaletteOnly();};$('clear').onclick=()=>{delete ans[idx];scheduleSessionSave();render();};$('review').onclick=()=>{review[idx]=!review[idx];scheduleSessionSave();renderPaletteOnly();};$('fullscreen').onclick=()=>document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen();$('submit').onclick=openSubmitModal;
function openSubmitModal(){const unanswered=qs.length-Object.keys(ans).length;$('modalTitle').textContent='Confirm Submission';$('modalText').innerHTML=unanswered>0?`మీరు ఇంకా <b>${unanswered}</b> ప్రశ్నలకు సమాధానం ఇవ్వలేదు.<br><br>Submit చేసిన తర్వాత మళ్లీ Exam లోకి రావడం సాధ్యం కాదు. అయినా Submit చేయాలనుకుంటున్నారా?`:'మీరు పరీక్షను ముగించాలనుకుంటున్నారా?<br><br>Submit చేసిన తర్వాత మళ్లీ Exam లోకి రావడం సాధ్యం కాదు.';$('submitModal').hidden=false;}
$('continueExam').onclick=()=>{$('submitModal').hidden=true};$('confirmSubmit').onclick=()=>submitExam(false);
async function downloadStudentAnswerSheet(score,detail){
  try{
    if(!window.html2canvas||!window.jspdf)return false;
    const sheet=document.createElement('div');
    sheet.className='answerSheetPdf';
    sheet.style.cssText='position:fixed;left:0;top:0;transform:translateX(-120vw);width:760px;background:#ffffff;color:#111111;padding:28px;z-index:2147483647;opacity:1;visibility:visible;';
    sheet.innerHTML=`<div class="asBrand">${exam.logoUrl?`<img src="${esc(exam.logoUrl)}" class="asLogo">`:'<div class="asBrandMark">KSR</div>'}<div><h1>${esc(exam.instituteName||exam.instituteCode||'Institute')}</h1><p>Professional MCQ Examination Platform</p></div></div><div class="asHead"><h2>Student Answer Sheet</h2><p><b>Exam:</b> ${esc(exam.title||'Daily Test')}</p><p><b>Exam ID:</b> ${esc(exam.examId||exam.examCode||'')} &nbsp; | &nbsp; <b>Batch:</b> ${esc(exam.batchName||'-')}</p><p><b>Name:</b> ${esc(name)} &nbsp; | &nbsp; <b>Exam Code:</b> ${esc(accessData.code||'')}</p><p><b>Submitted:</b> ${new Date().toLocaleString('en-IN')}</p><div class="asSummaryGrid"><span>Total <b>${qs.length}</b></span><span>Correct <b>${detail.filter(x=>x.correct).length}</b></span><span>Wrong <b>${detail.filter(x=>x.answer&&!x.correct).length}</b></span><span>Unanswered <b>${detail.filter(x=>!x.answer).length}</b></span><span>Score <b>${score}/${qs.length}</b></span></div></div>`+detail.map((d,i)=>{
      const q=qs[i];
      return `<div class="asQuestion"><div class="asQ"><b>Q${i+1}.</b> ${formatQuestion(q.question||'')}</div><div class="asOptions">${(q.options||[]).map(o=>{
        const selected=d.answer===o.key, correct=o.key===d.correctAnswer;
        return `<div class="asOption ${selected?'asSelected':''} ${correct?'asCorrect':''}"><b>${o.key})</b> <span>${esc(o.text||'')}</span>${selected?'<strong class="asTick">✓ Your Answer</strong>':''}${correct?'<em>Correct Answer</em>':''}</div>`
      }).join('')}</div></div>`
    }).join('')+`<div class="asFooter">Generated by KSR EXAMOS • ${new Date().toLocaleString('en-IN')}</div>`;
    document.body.appendChild(sheet);
    await new Promise(r=>setTimeout(r,200));
    const canvas=await window.html2canvas(sheet,{scale:1.6,useCORS:true,allowTaint:false,backgroundColor:'#ffffff',logging:false,windowWidth:820,scrollX:0,scrollY:0});
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF('p','pt','a4');
    const pageW=pdf.internal.pageSize.getWidth(),pageH=pdf.internal.pageSize.getHeight(),margin=24;
    const imgW=pageW-margin*2, imgH=canvas.height*imgW/canvas.width;
    const pageCanvas=document.createElement('canvas'),ctx=pageCanvas.getContext('2d');
    const pxPerPage=Math.floor((pageH-margin*2)*canvas.width/imgW);
    pageCanvas.width=canvas.width;
    let y=0,page=0;
    while(y<canvas.height){
      const h=Math.min(pxPerPage,canvas.height-y);
      pageCanvas.height=h;
      ctx.fillStyle='#ffffff';
      ctx.fillRect(0,0,pageCanvas.width,h);
      ctx.drawImage(canvas,0,y,canvas.width,h,0,0,canvas.width,h);
      if(page++)pdf.addPage();
      const data=pageCanvas.toDataURL('image/jpeg',0.94),drawH=h*imgW/canvas.width;
      pdf.addImage(data,'JPEG',margin,margin,imgW,drawH,undefined,'FAST');y+=h;
    }
    sheet.remove();
    const safeName=(name||'student').replace(/[^a-zA-Z0-9\u0C00-\u0C7F_-]+/g,'_');
    pdf.save(`${safeName}_${exam.examId||exam.examCode||'exam'}_Answer_Sheet.pdf`);
    return true;
  }catch(e){console.error('Answer PDF error',e);return false;}
}
async function submitExam(auto){
  if(submitting)return;submitting=true;$('submitModal').hidden=true;clearInterval(timerInt);saveTime();
  let score=0;let detail=qs.map((q,i)=>{let correct=ans[i]===q.answer;if(correct)score+=Number(q.marks||1);return {q:i+1,subject:q.subject||'General',answer:ans[i]||'',correctAnswer:q.answer,correct,timeSpent:spent[i]||0,question:q.question||'',options:q.options||[]}});
  try{
    await setDoc(doc(db,'results',examId+'_'+accessId),{examId,accessId,studentCode:accessData.code||'',examCode:exam.examId||exam.examCode||'',instituteCode:exam.instituteCode||'',instituteId:exam.instituteId||'',batchId:exam.batchId||'',batchName:exam.batchName||'',name,phone,hall,answers:ans,review,score,total:qs.length,details:detail,submittedAt:serverTimestamp(),autoSubmitted:auto});
    await setDoc(doc(db,'studentAccess',accessId),{...accessData,status:'completed',completedAt:serverTimestamp(),resultScore:score},{merge:true});
    try{localStorage.removeItem(sessionKey())}catch(e){}
    $('timeupModal').hidden=false;$('timeupModal').querySelector('h2').textContent='పరీక్ష Submit అయింది ✅';$('timeupModal').querySelector('p').textContent='మీ Answer Sheet PDF download అవుతోంది...';
    await downloadStudentAnswerSheet(score,detail);
    setTimeout(()=>{location.href='result.html?score='+score+'&total='+qs.length+'&name='+encodeURIComponent(name)+'&code='+encodeURIComponent(exam.examId||exam.examCode||'')},700);
  }catch(e){submitting=false;$('timeupModal').hidden=true;show('Submit error: '+e.message,'err');}
}
function shuffleQuestionOptions(q, seed){let a=(q.options||[]).map(o=>({...o,originalKey:o.key}));let r=mulberry32(hash(seed));for(let i=a.length-1;i>0;i--){let j=Math.floor(r()*(i+1));[a[i],a[j]]=[a[j],a[i]];}let newAnswer=q.answer;const options=a.map((o,i)=>{const key='ABCD'[i];if(o.originalKey===q.answer)newAnswer=key;return {key,text:o.text};});return {...q,options,answer:newAnswer};}
function hash(str){let h=1779033703; for(let i=0;i<String(str).length;i++){h=Math.imul(h^String(str).charCodeAt(i),3432918353);h=h<<13|h>>>19;} return h>>>0;}function mulberry32(a){return function(){let t=a+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return ((t^t>>>14)>>>0)/4294967296;}}
history.pushState({exam:true},'',location.href);window.addEventListener('popstate',()=>{history.pushState({exam:true},'',location.href);if(confirm('మీరు పరీక్షను వదిలి బయటకు వెళ్లాలనుకుంటున్నారా?')){location.href='index.html';}});window.addEventListener('beforeunload',e=>{if(!submitting){e.preventDefault();e.returnValue='';}});init();
</script>

</body></html>
