<!doctype html><html lang="te"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KSR DSC Enterprise V5.0</title><link rel="stylesheet" href="style.css"><script src="firebase-config.js"></script></head><body>
<header class="top"><h1>KSR DSC Enterprise V5.0</h1><p>Student Dashboard • Phase 1 Firebase Foundation</p><div class="nav"><a href="login.html">Admin Login</a><a href="setup.html">Setup</a></div></header>
<main class="wrap"><section class="card"><h2>Student Login</h2><div id="msg" style="display:none"></div><label>Institute Code</label><input id="inst" placeholder="e.g. KSR"><label>Student Name</label><input id="name" placeholder="మీ పేరు"><label>Phone / Hall Ticket</label><input id="phone" placeholder="Hall ticket / mobile"><button class="btn" id="showBtn">Show Exams</button><div class="hint">Exam start time vachinappudu Start button enable avuthundi.</div></section><section class="card"><h2>Available Exams</h2><div id="exams" class="grid"><div class="muted">Institute code enter చేసి Show Exams నొక్కండి.</div></div></section></main>
<script type="module">
import {ready,db,F,el,show,cleanCode} from './app.js';
el('showBtn').onclick=async()=>{if(!ready){show('msg','Firebase config set కాలేదు. ముందు setup.html open చేయండి.','err');return} const code=cleanCode(el('inst').value); if(!code){show('msg','Institute code enter చేయండి.','err');return} const q=F.query(F.collection(db,'exams'),F.where('instituteCode','==',code),F.orderBy('createdAt','desc')); const snap=await F.getDocs(q); const box=el('exams'); box.innerHTML=''; if(snap.empty){box.innerHTML='<div class="err">ఈ institute లో exams ఇంకా create చేయలేదు.</div>';return} snap.forEach(d=>{const e=d.data(); const div=document.createElement('div'); div.className='mini'; div.innerHTML=`<h3>${e.title||'Exam'}</h3><p><b>Institute:</b> ${e.instituteName||code}</p><p><b>Status:</b> <span class="pill">${e.status||'draft'}</span></p><p class="muted">Phase 2 లో actual DSC exam screen add అవుతుంది.</p>`; box.appendChild(div)})}
</script></body></html>
