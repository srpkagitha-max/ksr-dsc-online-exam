<!doctype html>
<html lang="te">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#061a42">
  <title>KSR Online Exams</title>
  <link rel="stylesheet" href="style.css">

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#064a86">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="KSR EXAMOS">
<link rel="apple-touch-icon" href="./icon-192.png">
</head>
<body class="simpleStudentLogin">
  <header class="simpleLoginHeader">
    <div class="simpleBrandMark">KSR</div>
    <div>
      <h1>KSR ONLINE EXAMS</h1>
      <p>Professional MCQ Examination Platform</p>
      <a href="tel:9063012104">Help Desk: 9063012104</a>
    </div>
  </header>

  <main class="simpleLoginWrap">
    <section class="simpleLoginCard">
      <div id="msg"></div>
      <div class="simpleLoginTitle">
        <h2>Student Login</h2>
        <p>Enter the details shared by your institute</p>
      </div>

      <label for="name">Student Name</label>
      <input id="name" autocomplete="name" placeholder="Enter your name">

      <label for="examId">Exam ID</label>
      <input id="examId" autocomplete="off" placeholder="Enter Exam ID">
      <div id="examPreview" class="examVerifyBox hidden"></div>

      <label for="examCode">Exam Code</label>
      <input id="examCode" autocomplete="off" placeholder="Enter Exam Code">

      <label for="phone">Phone Number</label>
      <input id="phone" inputmode="numeric" autocomplete="tel" placeholder="Enter 10-digit phone number">

      <button id="startExam" class="simpleStartBtn">
        <span class="btnText">START EXAM</span><span class="btnArrow">→</span>
      </button>

      <div class="simpleLoginNote">
        <b>Secure Exam Login</b>
        <span>Use the Exam ID and code shared by your institute. One code works for one student only.</span>
      </div>

      <a class="simpleAdminLink" href="login.html">Administrator Login</a>
    </section>
    <footer class="simpleLoginFooter">Powered by KSR Technologies</footer>
  </main>

<script type="module">
import{db,collection,getDocs,getDoc,doc,setDoc,serverTimestamp,query,where,$,show}from'./app.js';
const norm=v=>String(v||'').trim().toUpperCase();
const fmt=d=>{const x=Date.parse(d||'');return x?new Date(x).toLocaleString('en-IN',{dateStyle:'medium',timeStyle:'short'}):'Not specified'};
let previewExam=null;

setTimeout(()=>document.getElementById('splash')?.classList.add('hideSplash'),1100);
localStorage.removeItem('ksrLoginRemember');
$('phone').addEventListener('input',()=>{$('phone').value=$('phone').value.replace(/\D/g,'').slice(0,10)});

async function findExam(examPublicId){
  const directExam=await getDoc(doc(db,'exams',examPublicId));
  if(directExam.exists())return {docId:directExam.id,...directExam.data()};
  for(const field of ['examId','examCode']){
    const snap=await getDocs(query(collection(db,'exams'),where(field,'==',examPublicId)));
    if(!snap.empty){const d=snap.docs[0];return {docId:d.id,...d.data()};}
  }
  return null;
}

async function showExamPreview(){
  const examPublicId=norm($('examId').value);const box=$('examPreview');
  previewExam=null;if(!examPublicId){box.classList.add('hidden');box.innerHTML='';return;}
  box.classList.remove('hidden');box.innerHTML='<div class="verifyLoading">Checking exam details…</div>';
  try{
    const exam=await findExam(examPublicId);
    if(!exam){box.innerHTML='<div class="verifyError">⚠ Exam ID not found</div>';return;}
    previewExam=exam;
    const qCount=Array.isArray(exam.questions)?exam.questions.length:(Number(exam.questionCount)||'—');
    const totalMins=exam.secondsPerQuestion&&Number(qCount)?Math.ceil((exam.secondsPerQuestion*Number(qCount))/60):(exam.durationMinutes||'—');
    const now=Date.now(),st=Date.parse(exam.startTime||exam.start||''),en=Date.parse(exam.endTime||exam.end||'');
    const status=st&&now<st?'UPCOMING':en&&now>en?'CLOSED':'LIVE';
    box.innerHTML=`<div class="verifyHead"><b>✓ Exam Verified</b><span class="examStatus ${status.toLowerCase()}">${status}</span></div>
      <div class="verifyGrid"><div><span>Institute</span><b>${exam.instituteName||exam.institute||'KSR Online Exams'}</b></div>
      <div><span>Batch</span><b>${exam.batchName||'Open Batch'}</b></div>
      <div><span>Exam</span><b>${exam.title||exam.examTitle||examPublicId}</b></div>
      <div><span>Start</span><b>${fmt(exam.startTime||exam.start)}</b></div>
      <div><span>Questions</span><b>${qCount}</b></div><div><span>Time</span><b>${totalMins==='—'?'—':totalMins+' min'}</b></div></div>`;
  }catch(e){box.innerHTML='<div class="verifyError">Unable to verify now. You can still continue.</div>';}
}
$('examId').addEventListener('blur',showExamPreview);
$('examId').addEventListener('change',showExamPreview);

const inputs=[$('name'),$('examId'),$('examCode'),$('phone')];
inputs.forEach((el,i)=>el.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();if(i<inputs.length-1)inputs[i+1].focus();else $('startExam').click();}}));

$('startExam').onclick=async()=>{
  const name=$('name').value.trim(),examPublicId=norm($('examId').value),code=norm($('examCode').value),phone=$('phone').value.trim();
  if(!name||!examPublicId||!code||!/^[6-9]\d{9}$/.test(phone))return show('Name, valid Exam ID, Exam Code, 10 digit phone number enter cheyyandi.','err');
  const btn=$('startExam');btn.disabled=true;btn.classList.add('loading');btn.querySelector('.btnText').textContent='VERIFYING...';
  try{
    const exam=previewExam&&norm(previewExam.examId||previewExam.examCode||previewExam.docId)===examPublicId?previewExam:await findExam(examPublicId);
    if(!exam)return show('Exam ID dorakaledu. Correct Exam ID enter cheyyandi.','err');
    const now=Date.now(),st=Date.parse(exam.startTime||exam.start||''),en=Date.parse(exam.endTime||exam.end||''),loginBefore=Date.parse(exam.loginBefore||exam.startTime||'');
    if(exam.status!=='active')return show('Ee exam active ga ledu.','err');
    if(st&&now<st)return show('Exam ఇంకా ప్రారంభం కాలేదు.','warn');
    if(en&&now>en)return show('Exam ముగిసింది.','err');
    if(loginBefore&&now>loginBefore&&st&&now<st)return show('Login time ముగిసింది.','err');
    let access=null;const directAccess=await getDoc(doc(db,'studentAccess',code));
    if(directAccess.exists())access={id:directAccess.id,...directAccess.data()};
    else{
      const accessSnap=await getDocs(query(collection(db,'studentAccess'),where('code','==',code)));
      if(!accessSnap.empty){const d=accessSnap.docs[0];access={id:d.id,...d.data()};}
    }
    if(!access||access.examId!==exam.docId)return show('Exam Code invalid. Group lo share chesina correct code enter cheyyandi.','err');
    if(access.assignedName&&norm(access.assignedName)!==norm(name))return show(`Ee code ${access.assignedName} ki assign chesaru. Mee peru correct ga enter cheyyandi.`,'err');
    if(access.status==='completed')return show('Ee Exam Code tho exam already completed.','err');
    if(access.status==='inProgress'&&access.mobile&&access.mobile!==phone)return show('Ee code vere student use chestunnaru.','err');
    await setDoc(doc(db,'studentAccess',access.id),{...access,studentName:name,mobile:phone,hallTicket:phone,status:'inProgress',startedAt:access.startedAt||serverTimestamp()},{merge:true});
    localStorage.setItem('ksrStudent',JSON.stringify({name,phone,examId:examPublicId,code}));
    btn.querySelector('.btnText').textContent='SUCCESS ✓';btn.classList.add('success');
    setTimeout(()=>location.href=`exam.html?id=${encodeURIComponent(exam.docId)}&access=${encodeURIComponent(access.id)}&studentCode=${encodeURIComponent(code)}`,350);
  }catch(e){show(e.message,'err')}
  finally{setTimeout(()=>{btn.disabled=false;btn.classList.remove('loading','success');btn.querySelector('.btnText').textContent='START EXAM';},1200)}
};
</script>

<script src="./pwa-register.js?v=20260712-1"></script>
</body>
</html>
