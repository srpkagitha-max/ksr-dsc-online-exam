<!doctype html><html lang="te"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KSR Student</title><link rel="stylesheet" href="style.css"></head><body><div class="top"><div class="row"><div><div class="brand">KSR DSC Online Exam</div><div class="sub">Student Portal • Phase 1 Foundation</div></div><div class="nav"><a href="login.html">Admin</a></div></div></div><div class="wrap"><div class="card" style="max-width:680px;margin:auto"><h1>Student Login</h1><div id="message" class="hidden"></div><label>Institute Code</label><input id="inst" placeholder="e.g. KSR"><label>Student Name</label><input id="name" placeholder="మీ పేరు"><label>Phone / Hall Ticket</label><input id="phone" placeholder="Hall ticket / mobile"><button class="btn" id="showBtn">Show Exams</button><div id="examList"></div></div></div><script type="module">import{getInstitute,listExams,safeCode,toast}from'./app.js';showBtn.onclick=async()=>{try{let c=safeCode(inst.value);let i=await getInstitute(c);if(!i){toast('Institute dorakaledu','bad');return}let ex=await listExams(c);examList.innerHTML='<h2>'+i.name+' Exams</h2>'+ex.map(e=>`<div class="msg"><b>${e.title}</b><br><span class="small">${e.status} • ${e.startTime||''}</span><br><button class="btn gray" onclick="alert('Phase 2 lo exam screen activate avuthundi')">Open</button></div>`).join('')||'<div class="msg warn">No exams</div>'}catch(e){toast(e.message,'bad')}}</script></body></html>
