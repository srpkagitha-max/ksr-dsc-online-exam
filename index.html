<!doctype html><html lang="te"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KSR Student Login</title><link rel="stylesheet" href="style.css"></head><body>
<div class="hero studentBrandHero"><h1>KSR Online Exams</h1><p>Contact : 9063012104</p><div class="nav"><a class="btn gray" href="login.html">Admin Login</a></div></div>
<div class="wrap"><div class="card daily-login"><h2>Start Your Exam</h2><div id="msg"></div>
<label>Name</label><input id="name" placeholder="Enter your full name" autocomplete="name">
<label>Exam ID</label><input id="examId" placeholder="Example: TEST-101" autocomplete="off">
<label>Exam Code</label><input id="examCode" placeholder="Enter the unique code shared in group" autocomplete="off">
<label>Phone Number</label><input id="phone" inputmode="numeric" maxlength="10" placeholder="10 digit mobile number" autocomplete="tel">
<button class="green" id="startExam">Start Exam</button><p class="small">మీ పేరు, గ్రూప్‌లో ఇచ్చిన Exam ID, unique Exam Code మరియు phone number enter చేసి Start Exam నొక్కండి.</p></div></div>
<script type="module">
import{db,collection,getDocs,doc,setDoc,serverTimestamp,$,show}from'./app.js';
const norm=v=>String(v||'').trim().toUpperCase();
$('phone').addEventListener('input',()=>{$('phone').value=$('phone').value.replace(/\D/g,'').slice(0,10)});
$('startExam').onclick=async()=>{const name=$('name').value.trim(),examPublicId=norm($('examId').value),code=norm($('examCode').value),phone=$('phone').value.trim();if(!name||!examPublicId||!code||!/^[6-9]\d{9}$/.test(phone))return show('Name, valid Exam ID, Exam Code, 10 digit phone number enter cheyyandi.','err');$('startExam').disabled=true;try{
 let exam=null;const exams=await getDocs(collection(db,'exams'));exams.forEach(d=>{const e=d.data();if(norm(e.examId||e.examCode)===examPublicId&&!exam)exam={docId:d.id,...e}});if(!exam)return show('Exam ID dorakaledu. Correct Exam ID enter cheyyandi.','err');
 const now=Date.now(),st=Date.parse(exam.startTime||exam.start||''),en=Date.parse(exam.endTime||exam.end||'');if(exam.status!=='active')return show('Ee exam active ga ledu.','err');if(st&&now<st)return show('Exam ఇంకా ప్రారంభం కాలేదు.','warn');if(en&&now>en)return show('Exam ముగిసింది.','err');
 let access=null;const accessSnap=await getDocs(collection(db,'studentAccess'));accessSnap.forEach(d=>{const a=d.data();if(a.examId===exam.docId&&norm(a.code)===code&&!access)access={id:d.id,...a}});if(!access)return show('Exam Code invalid. Group lo share chesina correct code enter cheyyandi.','err');if(access.status==='completed')return show('Ee Exam Code tho exam already completed.','err');if(access.status==='inProgress'&&access.mobile&&access.mobile!==phone)return show('Ee code vere student use chestunnaru.','err');
 await setDoc(doc(db,'studentAccess',access.id),{...access,studentName:name,mobile:phone,hallTicket:phone,status:'inProgress',startedAt:access.startedAt||serverTimestamp()},{merge:true});
 localStorage.setItem('ksrStudent',JSON.stringify({name,phone,examId:examPublicId,code}));location.href=`exam.html?id=${encodeURIComponent(exam.docId)}&access=${encodeURIComponent(access.id)}&studentCode=${encodeURIComponent(code)}`;
 }catch(e){show(e.message,'err')}finally{$('startExam').disabled=false}};
</script></body></html>
