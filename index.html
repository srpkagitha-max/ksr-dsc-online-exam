<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KSR Student</title><link rel="stylesheet" href="style.css"></head><body><div class="hero"><h1>KSR DSC Online Exam</h1><p>Student Portal</p><div class="nav"><a class="btn gray" href="login.html">Admin</a></div></div><div class="wrap"><div class="card"><h2>Student Login</h2><label>Institute Code</label><input id="inst" placeholder="KSR"><label>Student Name</label><input id="name"><label>Phone / Hall Ticket</label><input id="phone"><button id="show">Show Exams</button><div id="msg"></div><div id="exams"></div></div></div><script type="module">import{db,collection,getDocs,query,where,$,esc,show}from'./app.js';$('show').onclick=async()=>{const code=$('inst').value.trim().toUpperCase(); if(!code)return show('Institute code enter cheyyandi','err'); const qs=query(collection(db,'exams'),where('instituteCode','==',code),where('status','==','active')); const snap=await getDocs(qs); let html=''; snap.forEach(d=>{const e=d.data(); html+=`<div class="qcard"><b>${esc(e.title)}</b><p class="small">${esc(e.instituteCode)} • ${esc(e.status)}</p><a class="btn" href="exam.html?id=${d.id}&name=${encodeURIComponent($('name').value)}&phone=${encodeURIComponent($('phone').value)}">Start Exam</a></div>`}); $('exams').innerHTML=html||'<p class="msg warn">Active exams levu.</p>'};</script></body></html>
