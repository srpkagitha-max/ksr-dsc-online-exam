<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KSR Student</title><link rel="stylesheet" href="style.css"></head><body><div class="hero"><h1>KSR DSC Online Exam</h1><p>Version 1.1 Enterprise • Secure Student Portal</p><div class="nav"><a class="btn gray" href="login.html">Admin</a></div></div><div class="wrap"><div class="card"><h2>Student Login</h2><label>Institute Code</label><input id="inst" placeholder="KSR" autocomplete="off"><label>Exam Code</label><input id="examCode" placeholder="KSR-001" autocomplete="off"><label>Hall Ticket</label><input id="hall" placeholder="Hall ticket number"><label>Unique Student Code</label><input id="studentCode" placeholder="KSR001-A7X4" autocomplete="off"><button id="show">Verify & Check Exam</button><div id="msg"></div><div id="exams"></div></div></div><script type="module">import{db,collection,getDocs,$,esc,show}from'./app.js';$('show').onclick=async()=>{const instituteCode=$('inst').value.trim().toUpperCase(),examCode=$('examCode').value.trim().toUpperCase(),hall=$('hall').value.trim(),studentCode=$('studentCode').value.trim().toUpperCase();if(!instituteCode||!examCode||!hall||!studentCode)return show('Institute Code, Exam Code, Hall Ticket, Unique Student Code anni enter cheyyandi','err');try{const accessSnap=await getDocs(collection(db,'studentAccess'));let access=null;accessSnap.forEach(d=>{const x=d.data();if((x.instituteCode||'').toUpperCase()===instituteCode&&(x.examCode||'').toUpperCase()===examCode&&(x.hallTicket||'').toUpperCase()===hall.toUpperCase()&&(x.code||'').toUpperCase()===studentCode&&!access)access={id:d.id,...x};});if(!access){$('exams').innerHTML='';return show('Student details / Unique Code match కాలేదు.','err');}if(access.status==='completed'){return show('Ee student code tho exam already completed.','err');}const examSnap=await getDocs(collection(db,'exams'));let found=null;examSnap.forEach(d=>{const e=d.data();if(d.id===access.examId&&e.status==='active'&&!found)found={id:d.id,...e};});if(!found){$('exams').innerHTML='';return show('Active exam dorakaledu.','err');}const now=Date.now(),startMs=found.start?new Date(found.start).getTime():0,endMs=found.end?new Date(found.end).getTime():0;if(startMs&&now<startMs){$('exams').innerHTML='';return show('Exam ఇంకా ప్రారంభం కాలేదు.','warn');}if(endMs&&now>endMs){$('exams').innerHTML='';return show('Exam access window ముగిసింది.','err');}const photo=access.photoUrl?`<img src="${esc(access.photoUrl)}" alt="Student Photo" style="width:88px;height:88px;object-fit:cover;border-radius:12px;border:2px solid #ddd">`:'';$('exams').innerHTML=`<div class="qcard examConfirm"><div class="grid two"><div>${photo}<h3>${esc(access.studentName)}</h3><p><b>Hall Ticket:</b> ${esc(access.hallTicket)}</p><p><b>Mobile:</b> ${esc(access.mobile||'-')}</p><p><b>Batch:</b> ${esc(access.batch||'-')}</p></div><div><h3>${esc(found.title)}</h3><p><b>Institute:</b> ${esc(found.instituteName||found.instituteCode)}</p><p><b>Exam Code:</b> ${esc(found.examCode)}</p><p><b>Total Questions:</b> ${Number(found.questionCount||0)}</p><p><b>Total Time:</b> ${Number(found.totalMinutes||30)} minutes</p><p class="small">Details మీవే అయితే Start Exam నొక్కండి.</p></div></div><a class="btn green" href="exam.html?id=${found.id}&code=${encodeURIComponent(found.examCode)}&access=${encodeURIComponent(access.id)}&studentCode=${encodeURIComponent(access.code)}">Yes, This is Me — Start Exam</a></div>`;show('Identity verified ✅');}catch(e){show(e.message,'err')}};</script></body></html>
