<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KSR Student</title><link rel="stylesheet" href="style.css"></head><body><div class="hero"><h1>KSR DSC Online Exam</h1><p>Student Portal</p><div class="nav"><a class="btn gray" href="login.html">Admin</a></div></div><div class="wrap"><div class="card"><h2>Student Login</h2><label>Institute Code</label><input id="inst" placeholder="KSR" autocomplete="off"><label>Exam Code</label><input id="examCode" placeholder="KSR-001" autocomplete="off"><label>Student Name</label><input id="name" placeholder="Student name"><label>Phone / Hall Ticket</label><input id="phone" placeholder="Hall ticket or mobile"><button id="show">Check Exam</button><div id="msg"></div><div id="exams"></div></div></div><script type="module">import{db,collection,getDocs,query,where,$,esc,show}from'./app.js';$('show').onclick=async()=>{const code=$('inst').value.trim().toUpperCase(),examCode=$('examCode').value.trim().toUpperCase(),name=$('name').value.trim(),phone=$('phone').value.trim();if(!code||!examCode||!name||!phone)return show('Institute code, exam code, name, hall ticket anni enter cheyyandi','err');try{const qs=query(collection(db,'exams'),where('instituteCode','==',code),where('examCode','==',examCode));const snap=await getDocs(qs);let found=null; snap.forEach(d=>{const e=d.data();if(e.status==='active'&&!found)found={id:d.id,...e};});if(!found){$('exams').innerHTML='';return show('Active exam dorakaledu. Institute/Exam code check cheyyandi.','err');}const now=Date.now();const startMs=found.start?new Date(found.start).getTime():0;const endMs=found.end?new Date(found.end).getTime():0;if(startMs&&now<startMs){$('exams').innerHTML='';return show('Exam ఇంకా ప్రారంభం కాలేదు. Start time తర్వాత ప్రయత్నించండి.','warn');}if(endMs&&now>endMs){$('exams').innerHTML='';return show('Exam access window ముగిసింది.','err');}const qCount=Number(found.questionCount||0);$('exams').innerHTML=`<div class="qcard examConfirm"><h3>${esc(found.title)}</h3><p><b>Institute:</b> ${esc(found.instituteName||found.instituteCode)}</p><p><b>Institute Code:</b> ${esc(found.instituteCode)}</p><p><b>Exam Code:</b> ${esc(found.examCode)}</p><p><b>Total Questions:</b> ${qCount}</p><p><b>Total Time:</b> ${Number(found.totalMinutes||30)} minutes</p><p class="small">Correct exam ani confirm chesi Start Exam nokkandi.</p><a class="btn green" href="exam.html?id=${found.id}&code=${encodeURIComponent(found.examCode)}&name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}&hall=${encodeURIComponent(phone)}">Start Exam</a></div>`;show('Exam details found ✅');}catch(e){show(e.message,'err')}};</script></body></html>
