<!doctype html><html lang="te"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KSR Login</title><link rel="stylesheet" href="style.css"></head><body><div class="top"><div class="row"><div><div class="brand">KSR DSC Enterprise V5.0</div><div class="sub">Phase 1 • Admin Login</div></div><div class="nav"><a href="index.html">Student</a></div></div></div><div class="wrap"><div class="card" style="max-width:480px;margin:auto"><h1>Admin Login</h1><div id="message" class="hidden"></div><label>Email</label><input id="email" type="email" placeholder="admin@email.com"><label>Password</label><input id="password" type="password" placeholder="Password"><button class="btn" id="loginBtn">Login</button><p class="small">First time setup కోసం setup.html open cheyyi.</p></div></div><script type="module">import{login,toast}from'./app.js';loginBtn.onclick=async()=>{try{await login(email.value,password.value);location.href='admin.html'}catch(e){toast(e.message,'bad')}}</script></body></html>
