<!doctype html><html lang="te"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin Login</title><link rel="stylesheet" href="style.css"><script src="firebase-config.js"></script></head><body>
<header class="top"><h1>KSR DSC Enterprise V5.0</h1><p>Phase 1 • Admin Login</p><div class="nav"><a href="index.html">Student</a><a href="setup.html">Setup</a><a href="create-admin.html">Create Admin</a></div></header>
<main class="wrap"><section class="card"><h2>Admin Login</h2><div id="msg" style="display:none"></div><label>Email</label><input id="email" type="email" placeholder="admin@gmail.com"><label>Password</label><input id="pass" type="password" placeholder="Password"><button class="btn" id="login">Login</button><div class="hint">First time: create-admin.html open chesi admin account create cheyyandi.</div></section></main>
<script type="module">
import {ready,auth,F,el,show} from './app.js';
el('login').onclick=async()=>{try{if(!ready){show('msg','Firebase config set కాలేదు. setup.html open చేసి config save చేయండి.','err');return} await F.signInWithEmailAndPassword(auth,el('email').value.trim(),el('pass').value); location.href='dashboard.html'}catch(e){show('msg',e.message,'err')}};
</script></body></html>
