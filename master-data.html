<!doctype html><html lang="te"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KSR Institute & Batch Master</title><link rel="stylesheet" href="style.css"></head><body>
<div class="hero"><h1>Institute • Batch • Student Master</h1><p>Daily Exams v5 Premium</p><div class="nav"><a class="btn gray" href="dashboard.html">Exam Dashboard</a><a class="btn orange" href="live-monitor.html">Live Monitor</a><button class="gray" id="logout">Logout</button></div></div>
<div class="wrap"><div id="msg"></div>
<div class="grid two">
<div class="card"><h2>1. Institute Master</h2><label>Institute Name</label><input id="instName" placeholder="KSR Academy"><label>Logo URL (optional)</label><input id="instLogo" placeholder="https://..."><button class="green" id="saveInst">Save Institute</button><div id="instList" class="compactList"></div></div>
<div class="card"><h2>2. Batch Master</h2><label>Institute</label><select id="batchInst"></select><label>Batch Name</label><input id="batchName" placeholder="Batch 1 / Morning Batch"><button class="green" id="saveBatch">Save Batch</button><div id="batchList" class="compactList"></div></div>
</div>
<div class="card"><h2>3. Students — Batch-wise</h2><div class="grid two"><div><label>Institute</label><select id="studentInst"></select></div><div><label>Batch</label><select id="studentBatch"></select></div><div><label>Student Name</label><input id="studentName" placeholder="Student name"></div><div><label>Hall Ticket / Roll No. (optional)</label><input id="studentRoll" placeholder="Roll number"></div></div><div class="action-row"><button class="green" id="addStudent">Add Student</button><button class="gray" id="clearStudent">Clear</button></div><label>Bulk Add (one name per line)</label><textarea id="bulkStudents" class="bits-box smallBits" placeholder="Student 1\nStudent 2\nStudent 3"></textarea><button id="bulkAdd" class="orange">Add All Names</button><div class="exam-search-row"><input id="studentSearch" placeholder="Search student"><button id="loadStudents" class="gray">Load Students</button></div><div id="studentList"></div></div>
</div><script type="module" src="master-data.js"></script></body></html>
