<!doctype html><html lang="te"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KSR Question Bank</title><link rel="stylesheet" href="style.css"></head><body>
<div class="hero"><h1>KSR Question Bank</h1><p>Subject-wise reusable question library</p><div class="nav"><a class="btn gray" href="admin.html">Admin</a><a class="btn gray" href="questions.html">Question Editor</a></div></div>
<div class="wrap"><div id="msg"></div>
<div class="card"><h2>Add Question to Bank</h2><div class="grid"><div><label>Institute Code</label><input id="inst" placeholder="KSR"></div><div><label>Subject</label><input id="subject" placeholder="Psychology"></div><div><label>Lesson</label><input id="lesson" placeholder="General"></div><div><label>Difficulty</label><select id="difficulty"><option>Easy</option><option selected>Medium</option><option>Hard</option></select></div></div><label>Question</label><textarea id="question"></textarea><div class="grid two"><div><label>A</label><input id="a"></div><div><label>B</label><input id="b"></div><div><label>C</label><input id="c"></div><div><label>D</label><input id="d"></div></div><label>Correct Answer</label><select id="answer"><option>A</option><option>B</option><option>C</option><option>D</option></select><button class="green" id="save">Save to Question Bank</button></div>
<div class="card"><h2>Saved Questions</h2><div class="grid"><div><label>Institute Code</label><input id="filterInst" placeholder="KSR"></div><div><label>Subject Filter</label><input id="filterSubject" placeholder="Optional"></div></div><button id="load">Load Questions</button><div id="list"></div></div>
</div><script type="module">
import{auth,onAuthStateChanged,$,show,esc,saveQuestionToBank,listQuestionBank,deleteBankQuestion}from'./app.js';
onAuthStateChanged(auth,u=>{if(!u)location.href='login.html'});
save.onclick=async()=>{try{const q={subject:subject.value,lesson:lesson.value,difficulty:difficulty.value,question:question.value,options:['A','B','C','D'].map(k=>({key:k,text:({A:a,B:b,C:c,D:d}[k]).value})),answer:answer.value,marks:1};await saveQuestionToBank(inst.value,q);show('Question Bank lo save ayyindi ✅');question.value=a.value=b.value=c.value=d.value='';}catch(e){show(e.message,'err')}};
load.onclick=async()=>{try{const rows=await listQuestionBank(filterInst.value,filterSubject.value.trim());list.innerHTML=rows.map((q,i)=>`<div class="qcard"><div class="qhead"><b>Q${i+1} • ${esc(q.subject||'General')}</b><button class="red del" data-id="${q.id}">Delete</button></div><p><b>${esc(q.question)}</b></p>${(q.options||[]).map(o=>`<div>${o.key}) ${esc(o.text)}</div>`).join('')}<p class="small">Answer: ${esc(q.answer||'-')} | ${esc(q.lesson||'General')} | ${esc(q.difficulty||'Medium')}</p></div>`).join('')||'<div class="msg warn">Questions levu</div>';document.querySelectorAll('.del').forEach(b=>b.onclick=async()=>{if(!confirm('Ee question ni permanent ga delete cheyyala?'))return;await deleteBankQuestion(b.dataset.id);b.closest('.qcard').remove();show('Question deleted')});}catch(e){show(e.message,'err')}};
</script></body></html>
