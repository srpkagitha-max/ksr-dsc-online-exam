<!DOCTYPE html><html lang="te"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KSR Result</title><link rel="stylesheet" href="style.css"></head><body>
<div class="topbar"><div class="wrap"><div class="brand">KSR DSC Online Exam Result</div><div class="sub">Answer Sheet PDF • Leaderboard</div><div class="nav no-print"><a href="index.html">Home</a><a href="admin.html">Admin</a></div></div></div>
<div class="wrap"><div id="result"></div><div class="card"><h2>Leaderboard</h2><div id="leader"></div></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script><script src="parser.js"></script><script src="pdf.js"></script><script>
let r;function esc(s){return String(s||'').replaceAll('<','&lt;')}function init(){try{r=JSON.parse(sessionStorage.getItem('ksr_last_result'))}catch(e){} if(!r){result.innerHTML='<div class="card">No result found.</div>';return}result.innerHTML=`<div class="card center"><h1>${esc(r.examTitle)}</h1><h2>${esc(r.name)} - ${esc(r.hall)}</h2><h1>${r.score} / ${r.total}</h1><h2>${r.percent}%</h2><button class="btn green no-print" onclick="downloadAnswerPdf(r)">Download Answer Sheet PDF</button></div><div class="card"><h2>Answer Sheet</h2>${r.detail.map(d=>`<div class="qbox"><b>Q${d.no}. ${esc(d.question)}</b><p>Your Answer: <b>${d.selected||'Not Answered'}</b> | Correct: <b>${d.correct}</b> | Marks: <b>${d.marks}</b></p></div>`).join('')}</div>`;let rows=getResults().filter(x=>x.examId===r.examId).sort((a,b)=>b.score-a.score).map((x,i)=>`<tr><td>${i+1}</td><td>${esc(x.name)}</td><td>${x.score}/${x.total}</td><td>${x.percent}%</td></tr>`).join('');leader.innerHTML=`<table class="table"><tr><th>Rank</th><th>Name</th><th>Marks</th><th>%</th></tr>${rows}</table>`}init();
</script></body></html>
