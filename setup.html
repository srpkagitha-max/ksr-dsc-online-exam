<!doctype html><html lang="te"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KSR Setup</title><link rel="stylesheet" href="style.css"></head><body><div class="top"><div class="row"><div><div class="brand">KSR Setup</div><div class="sub">Create First Super Admin</div></div><div class="nav"><a href="login.html">Login</a></div></div></div><div class="wrap"><div class="card" style="max-width:560px;margin:auto"><h1>First Setup</h1><div class="msg warn">Firebase config paste chesaka only once use cheyyi.</div><div id="message" class="hidden"></div><label>Super Admin Email</label><input id="email" type="email"><label>Password</label><input id="password" type="password"><label>Name</label><input id="name" value="KSR Super Admin"><button class="btn green" id="createBtn">Create Super Admin</button></div></div><script type="module">import{auth,db,toast}from'./app.js';import{createUserWithEmailAndPassword}from'https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js';import{doc,setDoc,serverTimestamp}from'https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js';createBtn.onclick=async()=>{try{const c=await createUserWithEmailAndPassword(auth,email.value,password.value);await setDoc(doc(db,'users',c.user.uid),{email:email.value,name:name.value,role:'superAdmin',active:true,createdAt:serverTimestamp()});toast('Super Admin created. Login cheyyi.','ok')}catch(e){toast(e.message,'bad')}}</script></body></html>
